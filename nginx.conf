server {
    listen 80;
    server_name tootcast.kyd.au;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Brotli or Zstd would normally be handled by Traefik or a custom Nginx build,
    # but we'll stick to Gzip for standard alpine Nginx for now.
}
